<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GYM · TEO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0b;--s1:#141416;--s2:#1c1c1f;--s3:#242428;--s4:#2e2e33;
  --accent:#c8f135;--accent2:#a8d420;--accent-dim:#3a4a10;
  --text:#f2f2ef;--muted:#6b6b72;--muted2:#4a4a52;
  --up:#4ade80;--down:#f87171;--neutral:#94a3b8;
  --border:#2a2a2f;--border2:#38383f;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r2:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border)}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-1px}
.hdr-logo span{color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:8px}
.week-chip{font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--border2);color:var(--muted);cursor:default}
.week-chip.deload{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--border)}
.wbtn{background:var(--s2);border:1px solid var(--border2);color:var(--muted);width:32px;height:32px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-family:var(--font);transition:all .15s}
.wbtn:active{transform:scale(.92);background:var(--s3)}
.wbtn:disabled{opacity:.3;cursor:default}
.week-info{flex:1}
.week-info-title{font-size:14px;font-weight:700}
.week-info-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}

/* DAY TABS */
.day-scroll{overflow-x:auto;scrollbar-width:none;padding:10px 16px;display:flex;gap:6px;background:var(--s1);border-bottom:1px solid var(--border)}
.day-scroll::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--s2);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;min-width:70px}
.dtab .dsub{font-size:9px;font-weight:400;font-family:var(--mono);display:block;margin-top:2px;opacity:.7}
.dtab.active{background:var(--accent);color:#0a0a0b;border-color:var(--accent)}
.dtab.done-tab{border-color:var(--up);color:var(--up)}
.dtab.done-tab.active{background:var(--up);color:#0a0a0b;border-color:var(--up)}

/* DELOAD BANNER */
.deload-banner{margin:12px 16px 0;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--r);padding:10px 14px;display:none}
.deload-banner.show{display:flex;align-items:flex-start;gap:10px}
.deload-icon{font-size:20px;flex-shrink:0}
.deload-text{font-size:12px;line-height:1.5;color:var(--accent)}
.deload-text strong{font-weight:700;display:block;margin-bottom:2px;font-size:13px}

/* SESSION HEADER */
.sess-hdr{padding:14px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.sess-title{font-size:16px;font-weight:700}
.sess-prog{font-family:var(--mono);font-size:12px;color:var(--muted)}
.pbar-wrap{height:2px;background:var(--s3);margin:0 16px 12px}
.pbar-fill{height:100%;background:var(--accent);transition:width .4s;border-radius:1px}

/* EXERCISE CARDS */
.ex-list{padding:0 16px;padding-bottom:120px}
.ex-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.ex-card.completed{border-color:var(--border2);opacity:.65}
.ex-card.completed .ex-name{color:var(--muted)}

.ex-top{display:flex;align-items:center;gap:10px;padding:12px 14px 10px}
.chk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.chk.on{background:var(--up);border-color:var(--up)}
.chk svg{display:none}
.chk.on svg{display:block}
.ex-name{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.ex-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;flex-shrink:0}
.ex-badge.comp{background:#1a173a;color:#afa9ec;border:1px solid #534ab740}
.ex-badge.isol{background:#0a1e18;color:#5dcaa5;border:1px solid #0f6e5640}

.ex-meta{display:flex;gap:10px;padding:0 14px 10px;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* SETS */
.sets-area{padding:0 14px 12px;display:flex;flex-direction:column;gap:6px}
.set-row{display:flex;align-items:center;gap:8px}
.set-num{font-family:var(--mono);font-size:11px;color:var(--muted2);width:18px;text-align:right;flex-shrink:0}
.set-inputs{display:flex;align-items:center;gap:6px;flex:1}
.inp{background:var(--s3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 10px;text-align:center;outline:none;transition:border-color .15s;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}
.inp-kg{width:72px}
.inp-reps{width:60px}
.inp-sep{font-size:12px;color:var(--muted2)}

/* DELTA BADGE */
.delta{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;flex-shrink:0;white-space:nowrap}
.delta.up{background:#14381f;color:var(--up);border:1px solid #4ade8030}
.delta.down{background:#2d1414;color:var(--down);border:1px solid #f8717130}
.delta.eq{background:var(--s3);color:var(--muted);border:1px solid var(--border)}

/* SUGGESTION */
.suggestion{margin:6px 14px 12px;background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.suggestion span{font-family:var(--mono);color:var(--accent);font-weight:500}
.suggestion.deload-sug{border-color:var(--accent-dim);background:var(--accent-dim)}
.suggestion.deload-sug span{color:var(--accent)}

/* BOTTOM ACTIONS */
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 10px);background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;gap:8px;z-index:100}
.btn{flex:1;padding:14px;border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;letter-spacing:.3px}
.btn:active{transform:scale(.97)}
.btn-ghost{background:var(--s2);color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:active{background:var(--s3)}
.btn-primary{background:var(--accent);color:#0a0a0b}
.btn-primary:active{background:var(--accent2)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{background:#14381f;border-color:#4ade8050;color:var(--up)}

/* SCROLLABLE CONTENT */
.scroll-body{flex:1;overflow-y:auto;overscroll-behavior:contain}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">GYM<span>·</span>TEO</div>
  <div class="hdr-right">
    <div class="week-chip" id="week-chip">SEM 1</div>
  </div>
</div>

<div class="week-nav">
  <button class="wbtn" id="btn-prev" onclick="changeWeek(-1)">‹</button>
  <div class="week-info">
    <div class="week-info-title" id="week-title">Semana 1 de 6</div>
    <div class="week-info-sub" id="week-sub">bloque de carga · semana 1/5</div>
  </div>
  <button class="wbtn" id="btn-next" onclick="changeWeek(1)">›</button>
</div>

<div class="day-scroll" id="day-tabs"></div>

<div class="scroll-body">
  <div class="deload-banner" id="deload-banner">
    <div class="deload-icon">⚡</div>
    <div class="deload-text">
      <strong>Semana de descarga</strong>
      Reduce el volumen a la mitad y usa el 80% del peso de la semana 5. Los pesos sugeridos ya están calculados. No es perder tiempo — es lo que permite seguir progresando.
    </div>
  </div>

  <div class="sess-hdr">
    <div class="sess-title" id="sess-title">Upper — Fuerza base</div>
    <div class="sess-prog" id="sess-prog">0/6</div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
  <div class="ex-list" id="ex-list"></div>
</div>

<div class="bottom">
  <button class="btn btn-ghost" onclick="clearDay()">Limpiar</button>
  <button class="btn btn-primary" onclick="finishDay()">Sesión completada ✓</button>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  {
    label:"Lunes",sub:"Upper",title:"Upper — Fuerza base",
    exercises:[
      {name:"Press militar con barra",tag:"comp",series:3,reps:"6-8",rir:"1-2"},
      {name:"Press banca con barra",tag:"comp",series:3,reps:"6-8",rir:"1-2"},
      {name:"Remo con barra",tag:"comp",series:3,reps:"6-8",rir:"1-2"},
      {name:"Elevaciones laterales mancuernas",tag:"isol",series:2,reps:"10-12",rir:"1"},
      {name:"Extensión tríceps polea cuerda",tag:"isol",series:2,reps:"10-12",rir:"1-2"},
      {name:"Curl bíceps barra",tag:"isol",series:2,reps:"10-12",rir:"1-2"},
    ]
  },
  {
    label:"Martes",sub:"Lower",title:"Lower — Pierna completa",
    exercises:[
      {name:"Sentadilla con barra",tag:"comp",series:3,reps:"6-8",rir:"1-2"},
      {name:"Romanian Deadlift",tag:"comp",series:3,reps:"8-10",rir:"2"},
      {name:"Prensa inclinada",tag:"comp",series:3,reps:"8-10",rir:"1-2"},
      {name:"Curl femoral tumbado",tag:"isol",series:2,reps:"10-12",rir:"1-2"},
      {name:"Hip thrust con barra",tag:"comp",series:3,reps:"10-12",rir:"2"},
      {name:"Gemelos de pie",tag:"isol",series:3,reps:"12-15",rir:"1"},
    ]
  },
  {
    label:"Miércoles",sub:"Push ★",title:"Push — Hombro + Tríceps",
    exercises:[
      {name:"Press militar mancuernas",tag:"comp",series:3,reps:"8-10",rir:"1-2"},
      {name:"Laterales polea baja",tag:"isol",series:3,reps:"12-15",rir:"1"},
      {name:"Press banca inclinado",tag:"comp",series:3,reps:"8-10",rir:"1-2"},
      {name:"Press francés barra EZ",tag:"comp",series:3,reps:"8-10",rir:"1-2"},
      {name:"Fondos en paralelas",tag:"comp",series:2,reps:"8-10",rir:"1-2"},
      {name:"Aperturas polea cruce",tag:"isol",series:2,reps:"12-15",rir:"1"},
    ]
  },
  {
    label:"Jueves",sub:"Pull",title:"Pull — Espalda + Posterior",
    exercises:[
      {name:"Peso muerto convencional",tag:"comp",series:3,reps:"4-6",rir:"2"},
      {name:"Dominadas lastradas",tag:"comp",series:3,reps:"6-10",rir:"1-2"},
      {name:"Remo en máquina/cable",tag:"comp",series:3,reps:"8-10",rir:"1-2"},
      {name:"Face pulls polea",tag:"isol",series:3,reps:"15-20",rir:"1"},
      {name:"Reverse fly máquina",tag:"isol",series:2,reps:"15-20",rir:"1"},
      {name:"Curl martillo mancuernas",tag:"isol",series:2,reps:"10-12",rir:"1-2"},
    ]
  },
  {
    label:"Viernes",sub:"Legs+Δ",title:"Legs + Hombro lateral",
    exercises:[
      {name:"Sentadilla búlgara",tag:"comp",series:3,reps:"8-10",rir:"1-2"},
      {name:"Extensión cuádriceps",tag:"isol",series:2,reps:"10-12",rir:"1"},
      {name:"Curl femoral sentado",tag:"isol",series:2,reps:"10-12",rir:"1"},
      {name:"Gemelos en prensa",tag:"isol",series:3,reps:"15-20",rir:"1"},
      {name:"Laterales mancuernas",tag:"isol",series:3,reps:"12-15",rir:"1"},
      {name:"Laterales polea baja",tag:"isol",series:2,reps:"15-20",rir:"1"},
    ]
  }
];

const TOTAL_WEEKS = 6;
const DELOAD_WEEK = 6;
let activeDay = 0;
let currentWeek = 1;

// STORAGE
function gk(w,d,e,s,t){return`teo_w${w}_d${d}_e${e}_s${s}_${t}`}
function ck(w,d,e){return`teo_chk_w${w}_d${d}_e${e}`}
function sessKey(w,d){return`teo_sess_w${w}_d${d}`}
function get(k){return localStorage.getItem(k)||''}
function set(k,v){localStorage.setItem(k,v)}

// Get max weight used across all sets for an exercise in a given week/day
function getMaxWeight(w,d,e){
  const ex=DAYS[d].exercises[e];
  let max=0;
  for(let s=0;s<ex.series;s++){
    const v=parseFloat(get(gk(w,d,e,s,'w')));
    if(!isNaN(v)&&v>max)max=v;
  }
  return max>0?max:null;
}

function getSuggestion(w,d,e){
  if(w===DELOAD_WEEK){
    // Use week 5 (last load week) as base
    const base=getMaxWeight(5,d,e);
    if(base===null)return null;
    return {type:'deload',value:Math.round(base*0.8*2)/2};
  }
  if(w===1)return null;
  const prev=getMaxWeight(w-1,d,e);
  if(prev===null)return null;
  // Suggest +2.5kg for compounds, +1kg for isolations
  const ex=DAYS[d].exercises[e];
  const inc=ex.tag==='comp'?2.5:1;
  return {type:'increase',value:Math.round((prev+inc)*2)/2,prev};
}

function getDelta(w,d,e){
  if(w<=1)return null;
  const curr=getMaxWeight(w,d,e);
  const prev=getMaxWeight(w-1,d,e);
  if(curr===null||prev===null)return null;
  if(curr>prev)return{dir:'up',diff:(curr-prev).toFixed(1)};
  if(curr<prev)return{dir:'down',diff:(prev-curr).toFixed(1)};
  return{dir:'eq'};
}

// RENDER
function renderTabs(){
  const el=document.getElementById('day-tabs');
  el.innerHTML=DAYS.map((d,i)=>{
    const done=get(sessKey(currentWeek,i))==='1';
    return`<div class="dtab${i===activeDay?' active':''}${done?' done-tab':''}" onclick="setDay(${i})">
      ${d.label}<span class="dsub">${d.sub}</span>
    </div>`;
  }).join('');
}

function renderWeekInfo(){
  const isDeload=currentWeek===DELOAD_WEEK;
  const chip=document.getElementById('week-chip');
  chip.textContent=isDeload?'DESCARGA':`SEM ${currentWeek}`;
  chip.className='week-chip'+(isDeload?' deload':'');
  document.getElementById('week-title').textContent=
    isDeload?`Semana ${currentWeek} — DESCARGA`:`Semana ${currentWeek} de ${TOTAL_WEEKS}`;
  document.getElementById('week-sub').textContent=
    isDeload?'80% del peso · mitad del volumen':`bloque de carga · semana ${currentWeek}/5`;
  document.getElementById('btn-prev').disabled=currentWeek<=1;
  document.getElementById('btn-next').disabled=currentWeek>=TOTAL_WEEKS;
  const banner=document.getElementById('deload-banner');
  banner.className='deload-banner'+(isDeload?' show':'');
}

function renderExercises(){
  const day=DAYS[activeDay];
  document.getElementById('sess-title').textContent=day.title;
  const el=document.getElementById('ex-list');

  el.innerHTML=day.exercises.map((ex,ei)=>{
    const done=get(ck(currentWeek,activeDay,ei))==='1';
    const delta=getDelta(currentWeek,activeDay,ei);
    const sug=getSuggestion(currentWeek,activeDay,ei);
    const isDeload=currentWeek===DELOAD_WEEK;

    // Deload: only show half series
    const showSeries=isDeload?Math.max(1,Math.ceil(ex.series/2)):ex.series;

    let setsHtml='';
    for(let s=0;s<showSeries;s++){
      const wv=get(gk(currentWeek,activeDay,ei,s,'w'));
      const rv=get(gk(currentWeek,activeDay,ei,s,'r'));

      let deltaHtml='';
      if(s===0&&delta){
        if(delta.dir==='up') deltaHtml=`<div class="delta up">↑ +${delta.diff}kg</div>`;
        else if(delta.dir==='down') deltaHtml=`<div class="delta down">↓ -${delta.diff}kg</div>`;
        else deltaHtml=`<div class="delta eq">= igual</div>`;
      }

      setsHtml+=`<div class="set-row">
        <div class="set-num">${s+1}</div>
        <div class="set-inputs">
          <input class="inp inp-kg" type="number" inputmode="decimal" placeholder="kg" value="${wv}" min="0" step="0.5"
            onchange="saveInput('${gk(currentWeek,activeDay,ei,s,'w')}',this.value);updateDelta(${ei})">
          <span class="inp-sep">×</span>
          <input class="inp inp-reps" type="number" inputmode="numeric" placeholder="reps" value="${rv}" min="1" step="1"
            onchange="saveInput('${gk(currentWeek,activeDay,ei,s,'r')}',this.value)">
        </div>
        ${deltaHtml}
      </div>`;
    }

    let sugHtml='';
    if(sug){
      if(sug.type==='deload'){
        sugHtml=`<div class="suggestion deload-sug">⚡ Descarga: usa <span>${sug.value}kg</span> (80% de sem.5)</div>`;
      } else {
        sugHtml=`<div class="suggestion">↗ Sugerencia próx. sem: <span>${sug.value}kg</span> (+${(sug.value-sug.prev).toFixed(1)}kg)</div>`;
      }
    }

    return`<div class="ex-card${done?' completed':''}" id="exc-${ei}">
      <div class="ex-top">
        <div class="chk${done?' on':''}" id="chk-${ei}" onclick="toggleDone(${ei})">
          <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
            <path d="M1 4.5L4.5 8L11 1" stroke="#0a0a0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="ex-name">${ex.name}</div>
        <div class="ex-badge ${ex.tag}">${ex.tag==='comp'?'comp':'isol'}</div>
      </div>
      <div class="ex-meta">
        <span>${ex.reps} reps</span>
        <span>·</span>
        <span>RIR ${ex.rir}</span>
        <span>·</span>
        <span>${showSeries} series${isDeload?' (descarga)':''}</span>
      </div>
      <div class="sets-area">${setsHtml}</div>
      ${sugHtml}
    </div>`;
  }).join('');

  updateProgress();
}

function updateDelta(ei){
  // Rerender only that card delta — simplest: full rerender
  renderExercises();
}

function saveInput(key,val){
  set(key,val);
  renderExercises();
}

function toggleDone(ei){
  const k=ck(currentWeek,activeDay,ei);
  set(k,get(k)==='1'?'0':'1');
  renderExercises();
  renderTabs();
}

function updateProgress(){
  const total=DAYS[activeDay].exercises.length;
  let done=0;
  DAYS[activeDay].exercises.forEach((_,ei)=>{
    if(get(ck(currentWeek,activeDay,ei))==='1')done++;
  });
  const pct=Math.round((done/total)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('sess-prog').textContent=`${done}/${total}`;
}

function setDay(i){
  activeDay=i;
  renderTabs();
  renderExercises();
}

function changeWeek(dir){
  const nw=currentWeek+dir;
  if(nw<1||nw>TOTAL_WEEKS)return;
  currentWeek=nw;
  renderWeekInfo();
  renderTabs();
  renderExercises();
}

function clearDay(){
  const day=DAYS[activeDay];
  day.exercises.forEach((ex,ei)=>{
    set(ck(currentWeek,activeDay,ei),'0');
    for(let s=0;s<ex.series;s++){
      set(gk(currentWeek,activeDay,ei,s,'w'),'');
      set(gk(currentWeek,activeDay,ei,s,'r'),'');
    }
  });
  renderExercises();
  renderTabs();
  toast('Día limpiado','');
}

function finishDay(){
  DAYS[activeDay].exercises.forEach((_,ei)=>{
    set(ck(currentWeek,activeDay,ei),'1');
  });
  set(sessKey(currentWeek,activeDay),'1');
  renderExercises();
  renderTabs();
  toast('¡Sesión completada! 💪','good');
}

function toast(msg,cls){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(cls?' '+cls:'');
  setTimeout(()=>t.className='toast',2500);
}

// INIT
renderWeekInfo();
renderTabs();
renderExercises();
</script>
</body>
</html>
